<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">1CLICK × Dotykačka XCP Plugin Icon</title>
  <desc id="desc">Original SVG icon for a JetBrains marketplace plugin: automation click, POS touch dot, and JS/YAML/JSON file motifs.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="40" x2="456" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#182033"/>
      <stop offset="0.55" stop-color="#0F1728"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="green" x1="116" y1="118" x2="386" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#70D64A"/>
      <stop offset="1" stop-color="#28A745"/>
    </linearGradient>
    <linearGradient id="blue" x1="96" y1="92" x2="402" y2="402" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39A8FF"/>
      <stop offset="1" stop-color="#1164D8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- JetBrains Marketplace friendly rounded tile -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bg)"/>
  <rect x="44" y="44" width="424" height="424" rx="94" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Abstract 1CLICK orbit / automation loop -->
  <path d="M146 160C190 104 282 96 340 144C385 181 400 244 375 297" stroke="url(#blue)" stroke-width="34" stroke-linecap="round"/>
  <path d="M371 207L392 299L302 274" stroke="#39A8FF" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" opacity="0.96"/>

  <!-- Dotykačka-inspired touch/POS dot, original mark -->
  <g filter="url(#softShadow)">
    <circle cx="246" cy="248" r="112" fill="url(#green)"/>
    <circle cx="246" cy="248" r="72" fill="#0F1728" fill-opacity="0.18"/>
    <circle cx="246" cy="248" r="36" fill="#FFFFFF" fill-opacity="0.92"/>
  </g>

  <!-- One-click cursor / tap cue -->
  <path d="M204 178V141H171" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M176 142L151 167" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round"/>
  <circle cx="203" cy="179" r="8" fill="#FFFFFF"/>

  <!-- Code/file stack: JS + YAML + JSON -->
  <g filter="url(#softShadow)">
    <rect x="282" y="295" width="136" height="104" rx="24" fill="#111827" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="2"/>
    <rect x="298" y="315" width="42" height="28" rx="8" fill="#F7DF1E"/>
    <text x="309" y="336" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#111827">JS</text>
    <path d="M300 362H401" stroke="#9CA3AF" stroke-width="10" stroke-linecap="round"/>
    <path d="M300 382H365" stroke="#9CA3AF" stroke-width="10" stroke-linecap="round" opacity="0.72"/>
  </g>

  <g opacity="0.92">
    <path d="M108 320H210" stroke="#FFFFFF" stroke-opacity="0.88" stroke-width="16" stroke-linecap="round"/>
    <path d="M108 356H184" stroke="#39A8FF" stroke-width="16" stroke-linecap="round"/>
    <path d="M109 392H164" stroke="#70D64A" stroke-width="16" stroke-linecap="round"/>
    <path d="M122 231L91 256L122 281" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <path d="M390 231L421 256L390 281" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <path d="M280 205L232 307" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.72"/>
  </g>

  <!-- Extension badge -->
  <rect x="164" y="408" width="184" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.94"/>
  <text x="202" y="439" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="900" letter-spacing="1.5" fill="#111827">.XCP</text>
</svg>
